apiVersion: apps/v1
kind: Deployment
metadata:
  name: smarttask-gateway
  namespace: smarttask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smarttask-gateway
  template:
    metadata:
      labels:
        app: smarttask-gateway
    spec:
      containers:
        - name: gateway
          image: smarttask/gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: BACKEND_URL
              value: "http://smarttask-backend:8080"
            - name: ANALYTICS_URL
              value: "http://smarttask-analytics:5000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: smarttask-gateway
  namespace: smarttask
spec:
  selector:
    app: smarttask-gateway
  ports:
    - port: 3001
      targetPort: 3001
