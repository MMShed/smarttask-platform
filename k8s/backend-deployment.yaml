apiVersion: apps/v1
kind: Deployment
metadata:
  name: smarttask-backend
  namespace: smarttask
  labels:
    app: smarttask-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smarttask-backend
  template:
    metadata:
      labels:
        app: smarttask-backend
    spec:
      containers:
        - name: backend
          image: smarttask/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "mssql"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smarttask-secrets
                  key: anthropic-api-key
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: smarttask-config
                  key: aws-region
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: smarttask-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: smarttask-secrets
                  key: aws-secret-access-key
            - name: MSSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: smarttask-config
                  key: mssql-host
            - name: MSSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smarttask-secrets
                  key: mssql-password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: smarttask-backend
  namespace: smarttask
spec:
  selector:
    app: smarttask-backend
  ports:
    - port: 8080
      targetPort: 8080
