# Server
server.port=8080
spring.application.name=smarttask-backend

# Default profile uses H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:smarttaskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Anthropic Claude
anthropic.api.key=${ANTHROPIC_API_KEY:changeme}

# AWS / Amazon Bedrock
aws.region=${AWS_REGION:us-east-1}

# Task processor
smarttask.processor.interval-ms=300000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
