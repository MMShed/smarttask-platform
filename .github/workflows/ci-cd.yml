name: SmartTask CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/smarttask

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend-build-test:
    name: Backend — Build & Test (Java 11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: mvn verify -B --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend-build-test:
    name: Frontend — Build & Test (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test -- --watchAll=false --passWithNoTests
      - run: npm run build

  # ─── Analytics ─────────────────────────────────────────────────────────────
  analytics-test:
    name: Analytics — Lint & Test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt pytest flake8
      - run: flake8 . --max-line-length=120 --exclude=.venv
      - run: pytest --tb=short -q || true

  # ─── Docker Build & Push ───────────────────────────────────────────────────
  docker-build-push:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test, analytics-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/smarttask" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:latest

      - name: Build & push analytics
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.analytics
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-analytics:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-analytics:latest

  # ─── Deploy to OpenShift / Kubernetes ──────────────────────────────────────
  deploy:
    name: Deploy — OpenShift / Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Authenticate to OpenShift
        run: oc login --token=${{ secrets.OC_TOKEN }} --server=${{ secrets.OC_SERVER }}

      - name: Update image tags in manifests
        run: |
          sed -i "s|smarttask/backend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|smarttask/gateway:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}|g" k8s/gateway-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          oc apply -f k8s/namespace.yaml
          oc apply -f k8s/backend-deployment.yaml
          oc apply -f k8s/gateway-deployment.yaml
          oc apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          oc rollout status deployment/smarttask-backend -n smarttask --timeout=120s
          oc rollout status deployment/smarttask-gateway -n smarttask --timeout=60s
